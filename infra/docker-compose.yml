name: cs2-platform

services:
  postgres:
    image: postgres:16
    # paralel sorgular /dev/shm kullanır; Docker varsayılanı 64MB, arşiv
    # büyüyünce ml roles sorgusunda DiskFull verdi (2026-07-06, ~1500 maç)
    shm_size: 1gb
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-cs2}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-cs2dev}
      POSTGRES_DB: ${POSTGRES_DB:-cs2}
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./postgres/schema.sql:/docker-entrypoint-initdb.d/schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-cs2}"]
      interval: 5s
      timeout: 3s
      retries: 10

  clickhouse:
    image: clickhouse/clickhouse-server:24.8
    environment:
      CLICKHOUSE_USER: ${CLICKHOUSE_USER:-cs2}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-cs2dev}
      CLICKHOUSE_DB: ${CLICKHOUSE_DB:-cs2}
    ports:
      - "8123:8123"   # HTTP
      - "9000:9000"   # native
    volumes:
      - ch_data:/var/lib/clickhouse
      - ./clickhouse/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    healthcheck:
      test: ["CMD", "clickhouse-client", "--user", "${CLICKHOUSE_USER:-cs2}", "--password", "${CLICKHOUSE_PASSWORD:-cs2dev}", "--query", "SELECT 1"]
      interval: 5s
      timeout: 3s
      retries: 20

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-cs2minio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-cs2miniodev}
      # Harici SSD'de (VM diski T7'de) anlık G/Ç takılmaları MinIO'nun
      # varsayılan 30 sn disk sağlık eşiğini aşıp diski "offline" işaretletiyor
      # (SlowDownRead/Write fırtınası). Eşiği gevşetip dalgayı atlatıyoruz.
      MINIO_DRIVE_MAX_TIMEOUT: "120s"
    ports:
      - "9100:9000"   # S3 API (host 9100, CH native 9000 ile çakışmasın)
      - "9101:9001"   # console
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${MINIO_ROOT_USER:-cs2minio} ${MINIO_ROOT_PASSWORD:-cs2miniodev} &&
      mc mb --ignore-existing local/${S3_BUCKET:-demos}
      "

  nats:
    image: nats:2.10-alpine
    command: ["-js", "-m", "8222"]
    ports:
      - "4222:4222"   # client
      - "8222:8222"   # monitoring
    volumes:
      - nats_data:/data
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://localhost:8222/healthz"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  pg_data:
  ch_data:
  minio_data:
  nats_data:
