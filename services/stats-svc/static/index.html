<!doctype html>
<html lang="tr">
<head>
<meta charset="utf-8">
<title>TacticalMind — analiz paneli</title>
<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; }
  body { font-family: -apple-system, system-ui, sans-serif; background:#101312; color:#ddd; margin:0; }
  header { padding:10px 20px; border-bottom:1px solid #262b28; display:flex; align-items:baseline; gap:12px; }
  header h1 { font-size:16px; margin:0; }
  main { display:grid; grid-template-columns:repeat(auto-fit, minmax(660px, 1fr)); gap:14px; padding:14px 20px; }
  .panel { background:#181c1a; border:1px solid #262b28; border-radius:8px; padding:12px 14px; }
  .panel h2 { font-size:14px; margin:0 0 8px; color:#9fc79f; }
  .toolbar { display:flex; gap:10px; align-items:center; flex-wrap:wrap; margin-bottom:8px; font-size:12px; }
  .toolbar label { color:#8a938c; }
  select, input[type=range], textarea, button { font:inherit; font-size:12px; background:#22272410; background:#222724; color:#ddd; border:1px solid #363c38; border-radius:4px; padding:3px 7px; }
  button { cursor:pointer; background:#2d4a2d; } button:hover { background:#3a5f3a; }
  button.small { font-size:11px; padding:0 5px; }
  canvas { background:#0b0e0c; border:1px solid #262b28; border-radius:4px; display:block; width:100%; height:auto; }
  textarea { width:100%; height:150px; font-family:ui-monospace,monospace; }
  table { border-collapse:collapse; font-size:11.5px; margin-top:6px; width:100%; }
  td, th { border:1px solid #2c322e; padding:2px 6px; text-align:left; white-space:nowrap; }
  .meta { font-size:11.5px; color:#7f8881; margin-top:4px; }
  .timeline { position:relative; height:24px; margin-top:6px; }
  .timeline input[type=range] { width:100%; position:absolute; top:0; margin:0; }
  .killmark { position:absolute; top:17px; width:2px; height:7px; background:#e05545; pointer-events:none; }
  .split { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
  .resultbox { max-height:340px; overflow:auto; }
</style>
</head>
<body>
<header>
  <h1>TacticalMind</h1>
  <span class="meta">harita layout'u arşivdeki pozisyon verisinden türetilir — demo arttıkça netleşir</span>
</header>
<main>

<section class="panel">
  <h2>2D Replay</h2>
  <div class="toolbar">
    <select id="rMatch" style="max-width:250px"></select>
    <select id="rRound"></select>
    <button id="rLoad">Yükle</button>
    <button id="rPlay">▶</button>
    <select id="rSpeed"><option value="1">1×</option><option value="2" selected>2×</option><option value="4">4×</option><option value="8">8×</option></select>
    <span class="meta" id="rClock">0:00</span>
    <label><input type="checkbox" id="rLabels" checked> bölge adları</label>
  </div>
  <canvas id="rCv" width="760" height="760"></canvas>
  <div class="timeline">
    <input type="range" id="rTime" min="0" max="100" value="0">
    <div id="rKillmarks"></div>
  </div>
  <div class="meta" id="rMeta"></div>
  <div class="meta" id="rKillfeed" style="min-height:28px"></div>
</section>

<section class="panel">
  <h2>Multi-View Stacking</h2>
  <div class="toolbar">
    <select id="sAlign">
      <option value="round_start">raunt başı</option>
      <option value="bomb_plant">bomba kurulumu</option>
      <option value="first_kill">ilk temas</option>
    </select>
    <select id="sSide"><option value="T">T</option><option value="CT">CT</option><option value="">ikisi</option></select>
    <button id="sLoad">DSL sonucunu stack'le</button>
    <label>t=<span id="sTlabel">0</span>s</label>
    <input type="range" id="sTime" min="-40" max="40" value="0" step="0.5" style="width:150px">
    <label>iz</label>
    <input type="range" id="sTrail" min="2" max="30" value="10" style="width:90px">
  </div>
  <canvas id="sCv" width="760" height="760"></canvas>
  <div class="meta" id="sMeta"></div>
  <div class="meta" id="sLegend"></div>
</section>

<section class="panel">
  <h2>DSL sorgusu</h2>
  <div class="split">
    <div>
      <div class="toolbar"><select id="examples" style="width:100%"></select></div>
      <textarea id="dsl"></textarea>
      <div class="toolbar" style="margin-top:6px">
        <button id="run">Çalıştır</button>
        <span class="meta" id="qmeta"></span>
      </div>
    </div>
    <div class="resultbox" id="result">—</div>
  </div>
</section>

<section class="panel">
  <h2>Isı haritası</h2>
  <div class="toolbar">
    <select id="map"></select>
    <select id="side"><option>T</option><option>CT</option></select>
    <select id="buy"><option value="">tüm buy</option><option>pistol</option><option>eco</option><option>semi</option><option>force</option><option>full</option></select>
    <button id="load">Yükle</button>
    <label><span id="timelabel">0–40</span> sn</label>
    <input type="range" id="t0" min="0" max="115" value="0" style="width:110px">
    <input type="range" id="t1" min="0" max="115" value="40" style="width:110px">
    <span class="meta" id="hmeta"></span>
  </div>
  <canvas id="cv" width="760" height="760"></canvas>
</section>

</main>
<script>
const $ = id => document.getElementById(id);
const SIDE_COLOR = { T: '#e8a33d', CT: '#4d9de0' };
const LAYER_HUES = [30, 200, 120, 280, 0, 60, 170, 320, 90, 240];
const RADAR = 1024;

async function getJSON(url) { const r = await fetch(url); const j = await r.json(); if (j.error) throw new Error(j.error); return j; }
async function postJSON(url, body) {
  const r = await fetch(url, {method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(body)});
  const j = await r.json(); if (j.error) throw new Error(j.error); return j;
}
const toPx = (v, w) => v * w / RADAR;

// ── harita arka planı: gerçek radar PNG varsa o, yoksa veri silüeti ──
const layoutCache = {}, radarImgs = {};
async function getLayout(mapName) {
  if (!layoutCache[mapName]) layoutCache[mapName] = await getJSON('/api/v1/maplayout?map=' + mapName);
  if (!radarImgs[mapName]) {
    const img = new Image();
    img.onload = () => { img.ok = true; drawReplay(); drawStack(); drawHeat(); };
    img.src = '/radars/' + mapName + '.png';
    radarImgs[mapName] = img;
  }
  return layoutCache[mapName];
}
function drawMapBase(ctx, w, layout, showLabels) {
  ctx.fillStyle = '#0b0e0c'; ctx.fillRect(0, 0, w, w);
  if (!layout) return;
  const img = radarImgs[layout.map];
  if (img && img.ok) {              // gerçek radar görseli (static/radars/)
    ctx.globalAlpha = 0.8;
    ctx.drawImage(img, 0, 0, w, w);
    ctx.globalAlpha = 1;
    return;
  }
  const cell = layout.cell_px * w / RADAR;
  let maxc = 0;
  for (const [,,c] of layout.cells) maxc = Math.max(maxc, c);
  const lmax = Math.log(maxc + 1);
  for (const [cx, cy, c] of layout.cells) {
    const a = 0.10 + 0.30 * Math.log(c + 1) / lmax;   // yoğun koridorlar daha parlak
    ctx.fillStyle = `rgba(120,140,125,${a.toFixed(3)})`;
    ctx.fillRect(cx * cell, cy * cell, cell + 0.5, cell + 0.5);
  }
  if (showLabels) {
    ctx.font = '10px system-ui'; ctx.textAlign = 'center';
    for (const p of layout.places) {
      const x = toPx(p.rx, w), y = toPx(p.ry, w);
      ctx.fillStyle = 'rgba(0,0,0,0.55)';
      ctx.fillRect(x - p.name.length * 2.8 - 3, y - 8, p.name.length * 5.6 + 6, 11);
      ctx.fillStyle = 'rgba(200,215,205,0.85)';
      ctx.fillText(p.name, x, y);
    }
    ctx.textAlign = 'left';
  }
}

// ── 2D Replay ────────────────────────────────────────────────────────
let rData = null, rLayout = null, rIdx = 0, rPlaying = false, rLast = 0;

async function replayInit() {
  const ms = await getJSON('/api/v1/matches');
  const ready = ms.filter(m => m.status === 'ready' && m.map_name);
  $('rMatch').innerHTML = ready.map(m =>
    `<option value="${m.match_id}">${m.name ?? m.match_id.slice(0,8)} · ${m.map_name} (${m.rounds}r)</option>`).join('');
  $('rMatch').onchange = loadRoundList;
  await loadRoundList();
}
async function loadRoundList() {
  const d = await getJSON('/api/v1/matches/' + $('rMatch').value);
  $('rRound').innerHTML = d.rounds.map(r =>
    `<option value="${r.round_number}">r${r.round_number} ${r.winner_side ?? '?'}${r.bomb_site ? ' 💣' + r.bomb_site : ''}</option>`).join('');
}
async function loadRound(matchId, roundNo, seekTick) {
  if (matchId) { $('rMatch').value = matchId; await loadRoundList(); $('rRound').value = roundNo; }
  rData = await getJSON(`/api/v1/rounds/${$('rMatch').value}/${$('rRound').value}/ticks`);
  rLayout = await getLayout(rData.map_name);
  const fe = rData.freeze_end_tick ?? rData.ticks[0];
  rData.startIdx = Math.max(0, rData.ticks.findIndex(t => t >= fe));
  $('rTime').min = rData.startIdx; $('rTime').max = rData.ticks.length - 1;
  rIdx = rData.startIdx;
  if (seekTick) {
    const i = rData.ticks.findIndex(t => t >= seekTick);
    if (i >= 0) rIdx = i;
  }
  $('rTime').value = rIdx;
  $('rMeta').textContent = `${rData.map_name} · r${rData.round_number} · ${rData.ticks.length} kare · ${rData.kills.length} kill`;
  $('rKillmarks').innerHTML = rData.kills.map(k => {
    const i = rData.ticks.findIndex(t => t >= k.tick);
    const pct = 100 * (i - rData.startIdx) / (rData.ticks.length - 1 - rData.startIdx);
    return `<div class="killmark" style="left:${Math.max(0, pct)}%"></div>`;
  }).join('');
  drawReplay();
}
function replayClock() {
  const fe = rData.freeze_end_tick ?? rData.ticks[rData.startIdx];
  const s = Math.max(0, (rData.ticks[rIdx] - fe) / rData.tick_rate);
  return Math.floor(s / 60) + ':' + String(Math.floor(s % 60)).padStart(2, '0');
}
// bomba görsel ömürleri (sn) — smoke/molotof oyun süreleriyle uyumlu
const NADE_LIFE = { smoke: 20, molotov: 7, incendiary: 7, flash: 0.7, he: 0.7, decoy: 15 };

function drawGrenades(ctx, w, tick) {
  if (!rData.grenades || !rData.radar) return;
  const tr = rData.tick_rate, scale = rData.radar.scale;
  const worldPx = u => toPx(u / scale, w);        // dünya birimi → canvas px
  for (const g of rData.grenades) {
    if (g.rx == null) continue;
    const dt = (tick - g.tick) / tr;              // patlamadan bu yana sn
    const life = NADE_LIFE[g.type] ?? 1;
    if (dt < 0 || dt > life) continue;
    const x = toPx(g.rx, w), y = toPx(g.ry, w);
    const fade = Math.min(1, (life - dt) / 2);    // son 2 sn'de sön
    if (g.type === 'smoke') {
      ctx.fillStyle = `rgba(180,185,190,${(0.45 * fade).toFixed(3)})`;
      ctx.beginPath(); ctx.arc(x, y, worldPx(144), 0, 7); ctx.fill();
    } else if (g.type === 'molotov' || g.type === 'incendiary') {
      ctx.fillStyle = `rgba(235,120,30,${(0.4 * fade).toFixed(3)})`;
      ctx.beginPath(); ctx.arc(x, y, worldPx(120), 0, 7); ctx.fill();
    } else if (g.type === 'flash') {
      const k = dt / life;                        // 0→1: beyaz patlama büyüyüp söner
      ctx.fillStyle = `rgba(255,255,255,${(0.9 * (1 - k)).toFixed(3)})`;
      ctx.beginPath(); ctx.arc(x, y, 4 + 14 * k, 0, 7); ctx.fill();
    } else if (g.type === 'he') {
      const k = dt / life;
      ctx.fillStyle = `rgba(255,140,60,${(0.8 * (1 - k)).toFixed(3)})`;
      ctx.beginPath(); ctx.arc(x, y, 4 + 12 * k, 0, 7); ctx.fill();
    } else if (g.type === 'decoy') {
      ctx.strokeStyle = `rgba(200,200,120,${(0.5 * fade).toFixed(3)})`;
      ctx.beginPath(); ctx.arc(x, y, 5, 0, 7); ctx.stroke();
    }
  }
}

function drawReplay() {
  if (!rData) return;
  const cv = $('rCv'), ctx = cv.getContext('2d'), w = cv.width;
  drawMapBase(ctx, w, rLayout, $('rLabels').checked);
  const tick = rData.ticks[rIdx];

  drawGrenades(ctx, w, tick);   // bombalar oyuncuların altında

  for (const k of rData.kills) {
    if (k.victim_rx != null && tick >= k.tick && tick - k.tick < 3 * rData.tick_rate) {
      ctx.strokeStyle = 'rgba(224,85,69,0.8)'; ctx.lineWidth = 2;
      ctx.beginPath(); ctx.arc(toPx(k.victim_rx, w), toPx(k.victim_ry, w), 11, 0, 7); ctx.stroke();
    }
  }
  for (const p of rData.players) {
    const rx = p.rx[rIdx], ry = p.ry[rIdx];
    if (rx == null) continue;
    const x = toPx(rx, w), y = toPx(ry, w);
    const alive = p.alive[rIdx], lower = p.lower ? p.lower[rIdx] : false;
    const col = SIDE_COLOR[p.side] || '#999';
    if (!alive) {
      ctx.strokeStyle = 'rgba(170,170,170,0.55)'; ctx.lineWidth = 1.5;
      ctx.beginPath(); ctx.moveTo(x-4, y-4); ctx.lineTo(x+4, y+4); ctx.moveTo(x+4, y-4); ctx.lineTo(x-4, y+4); ctx.stroke();
      continue;
    }
    const yaw = p.yaw[rIdx] * Math.PI / 180;
    ctx.strokeStyle = col; ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.moveTo(x, y); ctx.lineTo(x + 15 * Math.cos(yaw), y - 15 * Math.sin(yaw)); ctx.stroke();
    ctx.globalAlpha = lower ? 0.45 : 1;
    ctx.fillStyle = col;
    ctx.beginPath(); ctx.arc(x, y, 5.5, 0, 7); ctx.fill();
    ctx.strokeStyle = '#0b0e0c'; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.arc(x, y, 5.5, 0, 7); ctx.stroke();
    // can halkası: yeşil→kırmızı, HP oranı kadar yay
    const hp = p.hp[rIdx] ?? 0;
    ctx.strokeStyle = `hsl(${Math.round(120 * hp / 100)},75%,50%)`; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.arc(x, y, 8.5, -Math.PI/2, -Math.PI/2 + 2*Math.PI*hp/100); ctx.stroke();
    // körlük: beyaz hale (flash_remaining sn kaldıysa)
    const fl = p.flash[rIdx] ?? 0;
    if (fl > 0.2) {
      ctx.strokeStyle = `rgba(255,255,255,${Math.min(0.9, fl / 3).toFixed(2)})`; ctx.lineWidth = 3;
      ctx.beginPath(); ctx.arc(x, y, 12, 0, 7); ctx.stroke();
    }
    ctx.globalAlpha = 1;
    ctx.fillStyle = '#cfd8d0'; ctx.font = '10px system-ui';
    ctx.fillText(p.nickname || '', x + 10, y + 1);
    // aktif silah
    const wep = p.weapon[rIdx];
    if (wep) {
      ctx.fillStyle = 'rgba(160,170,162,0.85)'; ctx.font = '8.5px system-ui';
      ctx.fillText(wep, x + 10, y + 10);
    }
  }
  $('rClock').textContent = replayClock();
  const recent = rData.kills.filter(k => tick >= k.tick && tick - k.tick < 5 * rData.tick_rate);
  $('rKillfeed').innerHTML = recent.map(k => `${k.attacker ?? '?'} ⟶ ${k.victim ?? '?'} <i>(${k.weapon ?? ''})</i>`).join('<br>');
}
function replayStep(ts) {
  if (!rPlaying) return;
  const speed = +$('rSpeed').value;
  if (ts - rLast > 1000 / (16 * speed)) {
    rLast = ts;
    if (rIdx < rData.ticks.length - 1) { rIdx++; $('rTime').value = rIdx; drawReplay(); }
    else { rPlaying = false; $('rPlay').textContent = '▶'; }
  }
  requestAnimationFrame(replayStep);
}
$('rLoad').onclick = () => loadRound().catch(e => $('rMeta').textContent = 'Hata: ' + e.message);
$('rPlay').onclick = () => {
  if (!rData) return;
  rPlaying = !rPlaying;
  $('rPlay').textContent = rPlaying ? '⏸' : '▶';
  if (rPlaying) requestAnimationFrame(replayStep);
};
$('rTime').oninput = () => { rIdx = +$('rTime').value; drawReplay(); };
$('rLabels').onchange = drawReplay;

// ── Stacking ─────────────────────────────────────────────────────────
let sData = null, sLayout = null, lastClips = [];

async function loadStack() {
  if (!lastClips.length) { $('sMeta').textContent = 'Önce bir DSL sorgusu çalıştır (clips/rounds dönmeli).'; return; }
  const map0 = lastClips[0].map_name;
  const seen = new Set(); const rounds = [];
  for (const c of lastClips) {
    if (c.map_name !== map0) continue;
    const k = c.match_id + ':' + c.round_number;
    if (!seen.has(k)) { seen.add(k); rounds.push({ match_id: c.match_id, round_number: c.round_number }); }
    if (rounds.length === 10) break;
  }
  sData = await postJSON('/api/v1/stack', { rounds, align: $('sAlign').value, side: $('sSide').value || undefined });
  sLayout = await getLayout(sData.map_name);
  const skipped = sData.layers.filter(l => l.skipped);
  $('sMeta').textContent = `${sData.map_name} · ${sData.layers.length - skipped.length}/${sData.layers.length} katman` +
    (skipped.length ? ` (${skipped.map(l => 'r' + l.round_number + ': ' + l.skipped).join(', ')})` : '');
  $('sLegend').innerHTML = sData.layers.map((l, i) =>
    l.skipped ? '' : `<span style="color:hsl(${LAYER_HUES[i%10]},70%,60%)">■ r${l.round_number}</span>`).join(' ');
  drawStack();
}
function drawStack() {
  if (!sData) return;
  const cv = $('sCv'), ctx = cv.getContext('2d'), w = cv.width;
  drawMapBase(ctx, w, sLayout, true);
  const tNow = +$('sTime').value, trail = +$('sTrail').value;
  $('sTlabel').textContent = tNow.toFixed(1);
  sData.layers.forEach((ly, li) => {
    if (ly.skipped) return;
    const hue = LAYER_HUES[li % 10];
    for (const p of ly.players) {
      ctx.strokeStyle = `hsla(${hue},70%,60%,0.4)`; ctx.lineWidth = 1.5;
      ctx.beginPath();
      let started = false, lastIdx = -1;
      for (let i = 0; i < p.t.length; i++) {
        if (p.t[i] < tNow - trail || p.t[i] > tNow) continue;
        const x = toPx(p.rx[i], w), y = toPx(p.ry[i], w);
        if (!started) { ctx.moveTo(x, y); started = true; } else ctx.lineTo(x, y);
        lastIdx = i;
      }
      ctx.stroke();
      if (lastIdx >= 0) {
        ctx.fillStyle = `hsl(${hue},70%,60%)`;
        ctx.beginPath(); ctx.arc(toPx(p.rx[lastIdx], w), toPx(p.ry[lastIdx], w), 4, 0, 7); ctx.fill();
      }
    }
  });
  ctx.fillStyle = '#9aa39c'; ctx.font = '11px system-ui';
  ctx.fillText(`t = ${tNow.toFixed(1)} sn (${sData.align})`, 8, 14);
}
$('sLoad').onclick = () => loadStack().catch(e => $('sMeta').textContent = 'Hata: ' + e.message);
$('sTime').oninput = drawStack;
$('sTrail').oninput = drawStack;

// ── DSL paneli ───────────────────────────────────────────────────────
const EXAMPLES = {
  "Mirage T full-buy A kurulumları": {intent:"find_moments", filters:{map:"de_mirage", side:"T", buy_type:["full"], event:{type:"bomb", bomb_action:"plant", site:"A"}}, output:{format:"clips"}},
  "Mirage'da ilk flash'lar": {intent:"find_moments", filters:{map:"de_mirage", event:{type:"grenade", grenade_type:"flash", order:"first_of_type_in_round"}}, output:{format:"clips"}},
  "AWP açılış kill'leri": {intent:"find_moments", filters:{event:{type:"kill", weapon:"awp", first_kill:true}}, output:{format:"clips"}},
  "Dust2 B'ye erken bomba (ilk 35 sn)": {intent:"find_moments", filters:{map:"de_dust2", event:{type:"bomb", bomb_action:"plant", site:"B", time_window:{from:0,to:35}}}, output:{format:"clips"}},
  "Trade oranı (tüm arşiv)": {intent:"aggregate", filters:{event:{type:"kill", trade:true}}, output:{metric:"per_round"}},
  "Dust2 A'da ≥3 T (ilk 60 sn)": {intent:"find_moments", filters:{map:"de_dust2", side:"T", event:{type:"presence", area:"BombsiteA", min_players:3, time_window:{from:0,to:60}}}, output:{format:"clips"}}
};
$('examples').innerHTML = Object.keys(EXAMPLES).map(k => `<option>${k}</option>`).join('');
const setEx = () => $('dsl').value = JSON.stringify(EXAMPLES[$('examples').value], null, 2);
$('examples').onchange = setEx; setEx();

$('run').onclick = async () => {
  let q;
  try { q = JSON.parse($('dsl').value); } catch (e) { $('result').textContent = 'JSON hatası: ' + e.message; return; }
  let j;
  try { j = await postJSON('/api/v1/query', q); } catch (e) { $('result').textContent = 'Hata: ' + e.message; return; }
  $('qmeta').textContent = `${j.duration_ms} ms · raunt kümesi: ${j.round_count ?? '-'}`;
  const rows = j.clips || j.rounds;
  lastClips = rows || [];
  if (rows && rows.length) {
    const cols = Object.keys(rows[0]);
    $('result').innerHTML =
      `<table><tr><th></th>${cols.map(c=>`<th>${c}</th>`).join('')}</tr>` +
      rows.slice(0, 50).map((r, i) =>
        `<tr><td><button class="small" onclick="openClip(${i})">▶</button></td>${cols.map(c=>`<td>${r[c]}</td>`).join('')}</tr>`).join('') +
      `</table><div class="meta">${rows.length} sonuç${rows.length>50?' (ilk 50)':''} — "DSL sonucunu stack'le" ile üst üste koy</div>`;
  } else {
    $('result').innerHTML = `<pre>${JSON.stringify(j, null, 2)}</pre>`;
  }
};
window.openClip = i => {
  const c = lastClips[i];
  if (!c) return;
  loadRound(c.match_id, c.round_number, c.tick_start ?? c.tick)
    .then(() => { drawReplay(); window.scrollTo({top: 0, behavior: 'smooth'}); })
    .catch(e => $('rMeta').textContent = 'Hata: ' + e.message);
};

// ── Isı haritası (radar uzayında, silüet üstünde) ────────────────────
let heat = null, hLayout = null;
async function heatInit() {
  const ms = await getJSON('/api/v1/matches');
  const maps = [...new Set(ms.map(m => m.map_name).filter(Boolean))].sort();
  $('map').innerHTML = maps.map(m => `<option>${m}</option>`).join('');
}
$('load').onclick = async () => {
  const p = new URLSearchParams({map: $('map').value, side: $('side').value});
  if ($('buy').value) p.set('buy_type', $('buy').value);
  heat = await getJSON('/api/v1/heatmap?' + p);
  hLayout = await getLayout(heat.map);
  $('hmeta').textContent = `${heat.round_count} raunt · ${heat.buckets.length} kova · ${heat.duration_ms} ms`;
  drawHeat();
};
function drawHeat() {
  if (!heat) return;
  const a = +$('t0').value, b = +$('t1').value;
  $('timelabel').textContent = `${Math.min(a,b)}–${Math.max(a,b)}`;
  const cv = $('cv'), ctx = cv.getContext('2d'), w = cv.width;
  drawMapBase(ctx, w, hLayout, true);
  if (!heat.radar) return;
  const agg = new Map();
  let maxv = 0;
  for (const bk of heat.buckets) {
    if (bk.t < Math.min(a,b) || bk.t > Math.max(a,b)) continue;
    for (const [gx, gy, p] of bk.cells) {
      const k = gx + ':' + gy;
      const v = (agg.get(k) || 0) + p;
      agg.set(k, v);
      if (v > maxv) maxv = v;
    }
  }
  if (!agg.size) return;
  // dünya ızgara hücresi (16 birim) → radar → piksel
  const cal = heat.radar;
  const cellW = 16 / cal.scale * w / RADAR;
  for (const [k, v] of agg) {
    const [gx, gy] = k.split(':').map(Number);
    const rx = (gx * 16 - cal.pos_x) / cal.scale;
    const ry = (cal.pos_y - (gy + 1) * 16) / cal.scale;   // y ters: hücre üst kenarı
    const i = Math.pow(v / maxv, 0.45);
    ctx.fillStyle = `rgba(${Math.round(255*i)}, ${Math.round(80*i)}, 40, ${(0.15+0.6*i).toFixed(3)})`;
    ctx.fillRect(toPx(rx, w), toPx(ry, w), cellW + 0.5, cellW + 0.5);
  }
}
$('t0').oninput = drawHeat; $('t1').oninput = drawHeat;

replayInit().catch(console.error);
heatInit().catch(console.error);
</script>
